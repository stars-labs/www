name: Deploy StarsLab Site to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "www/**"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: www/package-lock.json

      - name: Install frontend deps
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Install API deps
        run: cd api && npm ci --no-audit --no-fund

      - name: Apply D1 migrations
        run: cd api && npx wrangler d1 migrations apply starslab-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5ccbd2ab14501cd236498638428d638d

      - name: Deploy Worker API
        run: cd api && npx wrangler deploy --minify src/site-worker.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5ccbd2ab14501cd236498638428d638d
