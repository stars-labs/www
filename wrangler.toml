name = "starslab-app"
main = "api/src/site-worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "5ccbd2ab14501cd236498638428d638d"
workers_dev = true
# route = "starslab.io/*" # Enable this when domain is configured in Cloudflare

# Serve static files from dist directory
assets = { directory = "dist" }

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "starslab-db"
database_id = "774b90d0-2ce4-4d11-95b1-6b9c29028ad0"
migrations_dir = "api/drizzle"

# Environment variables
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "*"